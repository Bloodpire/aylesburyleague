<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neighborhood Summer League</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #00BFFF;
            --gold-card: linear-gradient(160deg, #ffe359 0%, #cf9a2a 100%);
            --silver-card: linear-gradient(160deg, #e0e0e0 0%, #8e8e8e 100%);
            --bronze-card: linear-gradient(160deg, #d3915f 0%, #6e3a15 100%);
        }

        body {
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(180deg, #00BFFF 0%, #87CEEB 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); font-size: 3.5rem; margin-bottom: 20px; }

        /* Add Player Bar */
        .add-player-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .open-modal-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Card Grid */
        #leaderboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* FIFA Card */
        .card {
            position: relative;
            aspect-ratio: 2 / 3;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 50% 100%, 0% 88%);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .card:hover { transform: translateY(-10px) scale(1.02); }
        .card.gold { background: var(--gold-card); }
        .card.silver { background: var(--silver-card); }
        .card.bronze { background: var(--bronze-card); color: white; }

        .delete-x {
            position: absolute;
            top: 10px;
            left: 15px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .player-img {
            width: 110px;
            height: 110px;
            margin: 10px auto;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.5);
        }

        .ovr-main { font-size: 3.8rem; font-weight: 900; line-height: 1; margin: 0; }
        .player-name { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.1); margin: 5px 0; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Modal / Menu Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            position: relative;
        }

        .modal-header { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; text-align: center; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Oswald', sans-serif;
        }

        .save-btn {
            grid-column: span 2;
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ NEIGHBORHOOD SUMMER LEAGUE</h1>

    <div class="add-player-section">
        <button class="open-modal-btn" onclick="openEditModal()">+ Add New Player</button>
    </div>

    <div id="leaderboard"></div>
</div>

<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-header" id="modalTitle">Add Player</div>
        
        <div class="form-grid">
            <input type="hidden" id="edit-id">
            <input type="text" id="name" placeholder="Full Name" class="full-width">
            <input type="text" id="img-url" placeholder="Photo URL (Optional)" class="full-width">
            <input type="text" id="pos" placeholder="POS (ST, CM, etc.)">
            <select id="wf">
                <option value="⭐">1★ WF</option>
                <option value="⭐⭐">2★ WF</option>
                <option value="⭐⭐⭐">3★ WF</option>
                <option value="⭐⭐⭐⭐" selected>4★ WF</option>
                <option value="⭐⭐⭐⭐⭐">5★ WF</option>
            </select>
            <input type="number" id="pac" placeholder="PAC" max="99">
            <input type="number" id="sho" placeholder="SHO" max="99">
            <input type="number" id="pas" placeholder="PAS" max="99">
            <input type="number" id="dri" placeholder="DRI" max="99">
            <input type="number" id="def" placeholder="DEF" max="99">
            <input type="number" id="phy" placeholder="PHY" max="99">
            
            <button class="save-btn" onclick="savePlayer()">Save Player Data</button>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('neighborhoodPlayers')) || [];

    const modal = document.getElementById('playerModal');

    function openEditModal(playerId = null) {
        if (playerId) {
            const p = players.find(x => x.id === playerId);
            document.getElementById('modalTitle').innerText = "Edit Player Info";
            document.getElementById('edit-id').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('img-url').value = p.img.includes('flaticon') ? '' : p.img;
            document.getElementById('pos').value = p.pos;
            document.getElementById('wf').value = p.wf;
            document.getElementById('pac').value = p.pac;
            document.getElementById('sho').value = p.sho;
            document.getElementById('pas').value = p.pas;
            document.getElementById('dri').value = p.dri;
            document.getElementById('def').value = p.def;
            document.getElementById('phy').value = p.phy;
        } else {
            document.getElementById('modalTitle').innerText = "Add New Player";
            resetForm();
        }
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    function savePlayer() {
        const idInput = document.getElementById('edit-id').value;
        const stats = [
            parseInt(document.getElementById('pac').value) || 0,
            parseInt(document.getElementById('sho').value) || 0,
            parseInt(document.getElementById('pas').value) || 0,
            parseInt(document.getElementById('dri').value) || 0,
            parseInt(document.getElementById('def').value) || 0,
            parseInt(document.getElementById('phy').value) || 0
        ];
        const ovr = Math.round(stats.reduce((a, b) => a + b) / 6);
        
        const playerData = {
            id: idInput ? parseInt(idInput) : Date.now(),
            name: document.getElementById('name').value || "Player",
            img: document.getElementById('img-url').value || "https://cdn-icons-png.flaticon.com/512/1163/1163481.png",
            pos: (document.getElementById('pos').value || "ST").toUpperCase(),
            wf: document.getElementById('wf').value,
            pac: stats[0], sho: stats[1], pas: stats[2],
            dri: stats[3], def: stats[4], phy: stats[5],
            ovr: ovr
        };

        if (idInput) {
            const index = players.findIndex(p => p.id === parseInt(idInput));
            players[index] = playerData;
        } else {
            players.push(playerData);
        }

        updateDisplay();
        closeModal();
    }

    function removePlayer(e, id) {
        e.stopPropagation(); // Prevents opening the edit menu when clicking X
        if(confirm("Permanently delete this player?")) {
            players = players.filter(p => p.id !== id);
            updateDisplay();
        }
    }

    function updateDisplay() {
        players.sort((a, b) => b.ovr - a.ovr);
        localStorage.setItem('neighborhoodPlayers', JSON.stringify(players));
        const container = document.getElementById('leaderboard');
        container.innerHTML = '';

        players.forEach((p, index) => {
            let tier = p.ovr >= 80 ? 'gold' : (p.ovr >= 70 ? 'silver' : 'bronze');
            container.innerHTML += `
                <div class="card ${tier}" onclick="openEditModal(${p.id})">
                    <button class="delete-x" onclick="removePlayer(event, ${p.id})">X</button>
                    <div style="font-weight:bold; font-size: 0.9rem;">RANK #${index + 1}</div>
                    <img src="${p.img}" class="player-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1163/1163481.png'">
                    <div class="ovr-main">${p.ovr}</div>
                    <div class="player-name">${p.name}</div>
                    <div style="font-weight:bold; opacity: 0.9;">${p.pos} | ${p.wf}</div>
                    <div class="stats-grid">
                        <span>PAC ${p.pac}</span> <span>SHO ${p.sho}</span>
                        <span>PAS ${p.pas}</span> <span>DRI ${p.dri}</span>
                        <span>DEF ${p.def}</span> <span>PHY ${p.phy}</span>
                    </div>
                </div>
            `;
        });
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('.modal-content input').forEach(i => i.value = '');
    }

    // Close modal if user clicks outside of it
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }

    updateDisplay();
</script>
</body>
</html>
