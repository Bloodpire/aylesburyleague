<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylesbury League</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(180deg, #00BFFF 0%, #87CEEB 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.25); font-size: 3.5rem; margin-bottom: 20px; }

        /* Admin bar */
        .admin-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 10px; }
        .admin-status { color: white; font-size: 0.95rem; opacity: 0.9; }
        .admin-btn { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.6); padding: 7px 20px; border-radius: 25px; font-size: 0.95rem; font-weight: bold; cursor: pointer; font-family: 'Oswald', sans-serif; transition: 0.2s; }
        .admin-btn:hover { background: rgba(255,255,255,0.35); }
        .admin-btn.logout { border-color: #ff6b6b; color: #ff6b6b; }

        /* Section headers */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
        .section-title { color: white; font-size: 2rem; font-weight: 700; text-shadow: 1px 1px 6px rgba(0,0,0,0.2); }

        .add-btn-wrap { background: rgba(255,255,255,0.95); padding: 8px 18px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .add-btn-wrap.dark { background: rgba(0,0,0,0.35); border: 2px solid rgba(255,255,255,0.3); }
        .add-btn-wrap.totw-wrap { background: rgba(0,0,0,0.35); border: 2px solid #c9a84c; }
        .add-btn-wrap.allstars-wrap { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,100,180,0.7); }

        .section-btn { border: none; padding: 9px 28px; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
        .section-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .section-btn.green { background: #2ecc71; color: white; }
        .section-btn.totw { background: linear-gradient(135deg, #1a1200, #2e2000); color: #f0d060; border: 1px solid #c9a84c; }
        .section-btn.allstars { background: linear-gradient(135deg, #c2006a, #6800bb, #0088c0); color: white; }

        /* Card grids */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 28px; }

        /* SVG card wrapper */
        .card-wrap { position: relative; cursor: pointer; transition: transform 0.25s, filter 0.25s; }
        .card-wrap:hover { transform: translateY(-10px) scale(1.03); filter: brightness(1.07); }
        .card-wrap svg { width: 100%; height: auto; display: block; }

        /* Delete / lock buttons sit above the SVG */
        .del-btn {
            position: absolute; top: 9px; left: 9px;
            width: 24px; height: 24px; border-radius: 50%;
            background: #ff3333; color: white; border: none;
            font-size: 12px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; font-family: sans-serif; line-height: 1;
        }
        .del-btn:disabled { background: #888; cursor: not-allowed; opacity: 0.55; }
        .lock-ico { position: absolute; top: 9px; right: 9px; font-size: 13px; opacity: 0.6; z-index: 10; pointer-events: none; }

        /* Section dividers */
        .section-gap { margin-top: 55px; margin-bottom: 22px; }
        .divider-gold { width: 100%; height: 2px; border: none; background: linear-gradient(90deg, transparent, #c9a84c 30%, #c9a84c 70%, transparent); margin-bottom: 22px; }
        .divider-rainbow { width: 100%; height: 2px; border: none; background: linear-gradient(90deg, transparent, #ff60b0 15%, #a040ee 35%, #40d0ff 65%, #e8c040 85%, transparent); margin-bottom: 22px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 4% auto; padding: 28px; width: 90%; max-width: 480px; border-radius: 18px; position: relative; }
        .modal-box.totw-box { border-top: 4px solid #c9a84c; }
        .modal-box.allstars-box { border-top: 4px solid #e040c0; }
        .modal-title { font-size: 1.7rem; font-weight: bold; text-align: center; color: #222; margin-bottom: 18px; }
        .close-x { position: absolute; right: 18px; top: 12px; font-size: 1.9rem; cursor: pointer; color: #aaa; line-height: 1; }
        .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
        .fg .fw { grid-column: span 2; }
        .fg input, .fg select { padding: 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: 'Oswald', sans-serif; width: 100%; }
        .fg .sbtn { grid-column: span 2; padding: 14px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; margin-top: 6px; color: white; }
        .fg .sbtn.blue { background: #00BFFF; }
        .fg .sbtn.totw-s { background: linear-gradient(135deg,#1a1200,#2e2000); color: #f0d060; border: 1px solid #c9a84c; }
        .fg .sbtn.as-s { background: linear-gradient(135deg,#c2006a,#6800bb,#0088c0); }

        /* Login modal */
        .login-form { display: flex; flex-direction: column; gap: 13px; margin-top: 8px; }
        .login-form input { padding: 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: 'Oswald', sans-serif; }
        .login-submit { background: #00BFFF; color: white; border: none; padding: 12px; border-radius: 9px; font-size: 1.05rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; }
        #loginError { color: #e74c3c; font-size: 0.88rem; text-align: center; min-height: 18px; }
        .auth-badge { background: #2ecc71; color: white; border-radius: 20px; padding: 2px 11px; font-size: 0.82rem; font-weight: bold; }
        .empty-msg { grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.7); font-size: 1rem; padding: 28px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ AYLESBURY LEAGUE</h1>

    <div class="admin-bar">
        <span class="admin-status" id="adminStatus">🔒 Not logged in</span>
        <button class="admin-btn" id="adminActionBtn" onclick="handleAdminBtn()">Admin Login</button>
    </div>

    <div class="section-header">
        <h2 class="section-title">🏆 Leaderboard</h2>
        <div class="add-btn-wrap">
            <button class="section-btn green" id="addPlayerBtn" disabled onclick="requireAuth(()=>openPlayerModal())">+ Add Player</button>
        </div>
    </div>
    <div class="card-grid" id="leaderboard"></div>

    <div class="section-gap">
        <hr class="divider-gold">
        <div class="section-header">
            <h2 class="section-title">👑 Team of the Week</h2>
            <div class="add-btn-wrap totw-wrap">
                <button class="section-btn totw" id="addTotwBtn" disabled onclick="requireAuth(()=>openTotwModal())">+ Add TOTW</button>
            </div>
        </div>
        <div class="card-grid" id="totw-grid"></div>
    </div>

    <div class="section-gap">
        <hr class="divider-rainbow">
        <div class="section-header">
            <h2 class="section-title">🌟 Tournament All Stars</h2>
            <div class="add-btn-wrap allstars-wrap">
                <button class="section-btn allstars" id="addAllstarsBtn" disabled onclick="requireAuth(()=>openAllstarsModal())">+ Add All Star</button>
            </div>
        </div>
        <div class="card-grid" id="allstars-grid"></div>
    </div>
</div>

<div class="modal" id="playerModal">
    <div class="modal-box">
        <span class="close-x" onclick="closePlayerModal()">&times;</span>
        <div class="modal-title" id="playerModalTitle">Add Player</div>
        <div class="fg">
            <input type="hidden" id="p-id">
            <input class="fw" type="text" id="p-name" placeholder="Full Name">
            <input class="fw" type="text" id="p-img" placeholder="Photo URL (optional)">
            <input type="text" id="p-pos" placeholder="POS (ST, CM…)">
            <select id="p-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <input type="number" id="p-pac" placeholder="PAC" max="99">
            <input type="number" id="p-sho" placeholder="SHO" max="99">
            <input type="number" id="p-pas" placeholder="PAS" max="99">
            <input type="number" id="p-dri" placeholder="DRI" max="99">
            <input type="number" id="p-def" placeholder="DEF" max="99">
            <input type="number" id="p-phy" placeholder="PHY" max="99">
            <button class="sbtn blue" id="playerSaveBtn" onclick="savePlayer()">Add to League</button>
        </div>
    </div>
</div>

<div class="modal" id="totwModal">
    <div class="modal-box totw-box">
        <span class="close-x" onclick="closeTotwModal()">&times;</span>
        <div class="modal-title" id="totwModalTitle">👑 Add TOTW Player</div>
        <div class="fg">
            <input type="hidden" id="t-id">
            <input class="fw" type="text" id="t-name" placeholder="Full Name">
            <input class="fw" type="text" id="t-img" placeholder="Photo URL (optional)">
            <input type="text" id="t-pos" placeholder="POS (ST, CM…)">
            <select id="t-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <input type="number" id="t-pac" placeholder="PAC" max="99">
            <input type="number" id="t-sho" placeholder="SHO" max="99">
            <input type="number" id="t-pas" placeholder="PAS" max="99">
            <input type="number" id="t-dri" placeholder="DRI" max="99">
            <input type="number" id="t-def" placeholder="DEF" max="99">
            <input type="number" id="t-phy" placeholder="PHY" max="99">
            <button class="sbtn totw-s" id="totwSaveBtn" onclick="saveTotwPlayer()">Add to TOTW</button>
        </div>
    </div>
</div>

<div class="modal" id="allstarsModal">
    <div class="modal-box allstars-box">
        <span class="close-x" onclick="closeAllstarsModal()">&times;</span>
        <div class="modal-title" id="allstarsModalTitle">🌟 Add All Star</div>
        <div class="fg">
            <input type="hidden" id="a-id">
            <input class="fw" type="text" id="a-name" placeholder="Full Name">
            <input class="fw" type="text" id="a-img" placeholder="Photo URL (optional)">
            <input type="text" id="a-pos" placeholder="POS (ST, CM…)">
            <select id="a-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <select class="fw" id="a-color">
                <option value="pink">🩷 Pink</option>
                <option value="purple">💜 Purple</option>
                <option value="sky">🩵 Sky Blue</option>
                <option value="gold">🌟 Gold</option>
            </select>
            <input type="number" id="a-pac" placeholder="PAC" max="99">
            <input type="number" id="a-sho" placeholder="SHO" max="99">
            <input type="number" id="a-pas" placeholder="PAS" max="99">
            <input type="number" id="a-dri" placeholder="DRI" max="99">
            <input type="number" id="a-def" placeholder="DEF" max="99">
            <input type="number" id="a-phy" placeholder="PHY" max="99">
            <button class="sbtn as-s" id="allstarsSaveBtn" onclick="saveAllstar()">Add All Star</button>
        </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-box" style="max-width:360px;">
        <span class="close-x" onclick="closeLoginModal()">&times;</span>
        <div class="modal-title">🔐 Admin Login</div>
        <div class="login-form">
            <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
            <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
            <div id="loginError"></div>
            <button class="login-submit" onclick="submitLogin()">Login</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://bmwiqpkgdbeohkwbqaft.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kguMGdM9yIP_qoUdOU6x_w_4ObYO4Wt';
const sb = typeof window.supabase !== 'undefined' ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// ── Card colour palettes ──────────────────────────────────────────────────────
const PALETTES = {
    gold:   { g1:'#fff5b0', g2:'#f0c030', g3:'#b8860b', ray:'rgba(255,255,255,0.12)', text:'#2a1800', subtext:'#5a3a00', border:'#d4a017', glow:'rgba(220,170,0,0.5)' },
    silver: { g1:'#f8f8f8', g2:'#c0c0c0', g3:'#707070', ray:'rgba(255,255,255,0.11)', text:'#111', subtext:'#444', border:'#aaa', glow:'rgba(120,120,120,0.4)' },
    bronze: { g1:'#f0b888', g2:'#c06838', g3:'#602810', ray:'rgba(255,255,255,0.08)', text:'#fff', subtext:'rgba(255,255,255,0.85)', border:'#a0521a', glow:'rgba(140,70,0,0.5)' },
    totw:   { g1:'#2a1e00', g2:'#090909', g3:'#140e00', ray:'rgba(201,168,76,0.06)', text:'#f0d060', subtext:'#c9a84c', border:'#c9a84c', glow:'rgba(200,165,70,0.5)', shine:'rgba(201,168,76,0.13)' },
    pink:   { g1:'#ffb0d8', g2:'#e0107a', g3:'#780040', ray:'rgba(255,255,255,0.09)', text:'#fff', subtext:'rgba(255,255,255,0.85)', border:'#ff70c0', glow:'rgba(220,0,110,0.5)', shine:'rgba(255,180,220,0.14)' },
    purple: { g1:'#d898ff', g2:'#7800e0', g3:'#3a0068', ray:'rgba(255,255,255,0.09)', text:'#fff', subtext:'rgba(255,255,255,0.85)', border:'#b050ff', glow:'rgba(130,0,220,0.5)', shine:'rgba(210,160,255,0.14)' },
    sky:    { g1:'#90eeff', g2:'#00a8e0', g3:'#004870', ray:'rgba(255,255,255,0.10)', text:'#fff', subtext:'rgba(255,255,255,0.85)', border:'#50d8ff', glow:'rgba(0,170,230,0.5)', shine:'rgba(160,238,255,0.14)' },
    asgold: { g1:'#fff5b0', g2:'#f0c030', g3:'#806000', ray:'rgba(255,255,255,0.12)', text:'#2a1800', subtext:'#5a3a00', border:'#d4a017', glow:'rgba(220,170,0,0.5)', shine:'rgba(255,245,160,0.15)' },
};

// ── SVG card builder ──────────────────────────────────────────────────────────
function makePath() {
    return `
      M 60,0
      L 220,0
      A 22,22 0 0,1 242,22
      L 280,22
      A 18,18 0 0,1 280,40
      L 280,340
      Q 280,390 140,390
      Q 0,390 0,340
      L 0,40
      A 18,18 0 0,1 0,22
      L 38,22
      A 22,22 0 0,1 60,0
      Z
    `.trim();
}

function makeNotchPath() {
    return `
      M 38,0 A 22,22 0 0,0 60,22 L 38,22 Z
      M 242,0 A 22,22 0 0,1 220,22 L 242,22 Z
    `.trim();
}

function buildCard(p, rank, type) {
    const loggedIn = isLoggedIn();
    let palKey;
    if (type === 'leaderboard') palKey = p.ovr >= 80 ? 'gold' : p.ovr >= 70 ? 'silver' : 'bronze';
    else if (type === 'totw') palKey = 'totw';
    else palKey = { pink:'pink', purple:'purple', sky:'sky', gold:'asgold' }[p.color] || 'pink';
    
    const pal = PALETTES[palKey];
    const isTotw = type === 'totw';
    const isAllstar = type === 'allstar';
    const darkText = palKey === 'gold' || palKey === 'asgold';

    let label = isTotw ? 'TEAM OF THE WEEK' : isAllstar ? 'TOURNAMENT ALL STAR' : '';
    const labelColor = isTotw ? '#c9a84c' : darkText ? '#3a2000' : 'rgba(255,255,255,0.85)';
    const labelBorder = isTotw ? '#c9a84c' : darkText ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.5)';
    const dividerColor = isTotw ? '#c9a84c' : darkText ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.55)';

    const gradId = `g_${p.id}_${type}`;
    const rayId  = `r_${p.id}_${type}`;
    const clipId = `c_${p.id}_${type}`;
    const imgId  = `img_${p.id}_${type}`;
    const W = 280, H = 390;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    svg.setAttribute('xmlns','http://www.w3.org/2000/svg');

    svg.innerHTML = `
      <defs>
        <linearGradient id="${gradId}" x1="0%" y1="0%" x2="60%" y2="100%">
          <stop offset="0%"   stop-color="${pal.g1}"/>
          <stop offset="50%"  stop-color="${pal.g2}"/>
          <stop offset="100%" stop-color="${pal.g3}"/>
        </linearGradient>
        <pattern id="${rayId}" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(-40 140 390)">
          <line x1="0" y1="0" x2="0" y2="12" stroke="${pal.ray}" stroke-width="5"/>
        </pattern>
        <clipPath id="${clipId}"><path d="${makePath()}"/></clipPath>
        <filter id="sh_${gradId}" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="${pal.glow}"/>
        </filter>
      </defs>

      <path d="${makePath()}" fill="${pal.g2}" filter="url(#sh_${gradId})" opacity="0.6" transform="translate(0,6)"/>
      <path d="${makePath()}" fill="url(#${gradId})"/>
      <path d="${makePath()}" fill="url(#${rayId})" opacity="0.9"/>

      ${pal.shine ? `<rect x="168" y="0" width="44" height="${H}" fill="${pal.shine}" transform="skewX(-7)" clip-path="url(#${clipId})"/>` : ''}

      <path d="${makePath()}" fill="none" stroke="${pal.border}" stroke-width="2.5" opacity="0.7"/>
      <path d="${makeNotchPath()}" fill="${pal.g3}" opacity="0.55"/>

      <text x="22" y="48" font-family="Oswald,sans-serif" font-size="36" font-weight="900" fill="${pal.text}" opacity="0.95">${p.ovr}</text>
      <text x="22" y="64" font-family="Oswald,sans-serif" font-size="13" font-weight="700" fill="${pal.subtext}">${p.pos}</text>
      <text x="22" y="78" font-family="Oswald,sans-serif" font-size="10" font-weight="600" fill="${pal.subtext}">${p.wf}</text>

      ${label
        ? `<rect x="${W/2 - 72}" y="8" width="144" height="18" rx="3" fill="rgba(0,0,0,0.35)" stroke="${labelBorder}" stroke-width="1"/>
           <text x="${W/2}" y="21" font-family="Oswald,sans-serif" font-size="9" font-weight="900" letter-spacing="1.5" text-anchor="middle" fill="${labelColor}">${label}</text>`
        : `<text x="${W/2}" y="20" font-family="Oswald,sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="${pal.subtext}" opacity="0.8">RANK #${rank + 1}</text>`
      }

      <defs><clipPath id="${imgId}"><circle cx="${W/2}" cy="165" r="68"/></clipPath></defs>
      <circle cx="${W/2}" cy="165" r="70" fill="${pal.g3}" opacity="0.5"/>
      <circle cx="${W/2}" cy="165" r="70" fill="none" stroke="${pal.border}" stroke-width="2.5"/>
      <image href="${p.img}" x="${W/2-68}" y="97" width="136" height="136" clip-path="url(#${imgId})" preserveAspectRatio="xMidYMid slice" onerror="this.setAttribute('href','https://cdn-icons-png.flaticon.com/512/1163/1163481.png')"/>

      <line x1="30" y1="248" x2="${W-30}" y2="248" stroke="${dividerColor}" stroke-width="1.2"/>
      <text x="${W/2}" y="268" font-family="Oswald,sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="${pal.text}" letter-spacing="0.5">${p.name.toUpperCase()}</text>

      <g transform="translate(140, 312)" font-family="Oswald,sans-serif" text-anchor="middle" fill="${pal.text}">
        <g transform="translate(-95, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">PAC</text>
          <text y="24" font-size="21" font-weight="900">${p.pac}</text>
        </g>
        <g transform="translate(-57, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">SHO</text>
          <text y="24" font-size="21" font-weight="900">${p.sho}</text>
        </g>
        <g transform="translate(-19, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">PAS</text>
          <text y="24" font-size="21" font-weight="900">${p.pas}</text>
        </g>
        <g transform="translate(19, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">DRI</text>
          <text y="24" font-size="21" font-weight="900">${p.dri}</text>
        </g>
        <g transform="translate(57, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">DEF</text>
          <text y="24" font-size="21" font-weight="900">${p.def}</text>
        </g>
        <g transform="translate(95, 0)">
          <text font-size="11" font-weight="700" fill="${pal.subtext}">PHY</text>
          <text y="24" font-size="21" font-weight="900">${p.phy}</text>
        </g>
      </g>
    `;

    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.id = p.id;

    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '✕'; del.disabled = !loggedIn;
    del.onclick = e => { e.stopPropagation(); if(confirm('Delete?')) type==='leaderboard'?deletePlayer(p.id):type==='totw'?deleteTotwPlayer(p.id):deleteAllstar(p.id); };

    if (!loggedIn) {
        const lock = document.createElement('span');
        lock.className = 'lock-ico'; lock.textContent = '🔒';
        wrap.appendChild(lock);
    }

    wrap.appendChild(del);
    wrap.appendChild(svg);
    wrap.addEventListener('click', () => { if (type === 'leaderboard') requireAuth(() => openPlayerModal(p.id)); else if (type === 'totw') requireAuth(() => openTotwModal(p.id)); else requireAuth(() => openAllstarsModal(p.id)); });
    return wrap;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let currentAdmin = null;
const isLoggedIn = () => currentAdmin !== null;
let pendingCb = null;
function requireAuth(cb) { if (isLoggedIn()) cb(); else { pendingCb = cb; openLoginModal(); } }

function updateAdminUI() {
    const loggedIn = isLoggedIn();
    document.getElementById('adminStatus').innerHTML = loggedIn
        ? `✅ Logged in as <span class="auth-badge">${currentAdmin.username}</span>`
        : '🔒 Not logged in';
    const btn = document.getElementById('adminActionBtn');
    btn.textContent = loggedIn ? 'Logout' : 'Admin Login';
    btn.className = loggedIn ? 'admin-btn logout' : 'admin-btn';
    ['addPlayerBtn','addTotwBtn','addAllstarsBtn'].forEach(id => document.getElementById(id).disabled = !loggedIn);
    renderAll();
}

function handleAdminBtn() { isLoggedIn() ? (currentAdmin=null, updateAdminUI()) : openLoginModal(); }

const loginModal = document.getElementById('loginModal');
function openLoginModal() {
    ['loginUser','loginPass'].forEach(id => document.getElementById(id).value='');
    document.getElementById('loginError').textContent='';
    loginModal.style.display='block';
    setTimeout(()=>document.getElementById('loginUser').focus(),80);
}
function closeLoginModal() { loginModal.style.display='none'; pendingCb=null; }
async function submitLogin() {
    const u=document.getElementById('loginUser').value.trim(), p=document.getElementById('loginPass').value;
    const e=document.getElementById('loginError');
    if(!u||!p){e.textContent='Enter credentials.';return;}
    e.textContent='⏳ Checking…';
    try {
        const {data,error}=await sb.from('admins').select('id,username').eq('username',u).eq('password',p).maybeSingle();
        if(error)throw error;
        if(data){
            currentAdmin={id:data.id,username:data.username};
            closeLoginModal(); updateAdminUI();
            if(pendingCb){const cb=pendingCb;pendingCb=null;cb();}
        } else e.textContent='❌ Invalid credentials.';
    } catch(err){e.textContent='⚠️ Login failed.';}
}

// ── Data & render ─────────────────────────────────────────────────────────────
let players=[], totwPlayers=[], allstarPlayers=[];

function renderAll() { renderLeaderboard(); renderTotw(); renderAllstars(); }

function renderLeaderboard() {
    players.sort((a,b)=>b.ovr-a.ovr);
    const c=document.getElementById('leaderboard'); c.innerHTML='';
    if(!players.length){c.innerHTML='<div class="empty-msg">No players yet.</div>';return;}
    players.forEach((p,i)=>c.appendChild(buildCard(p,i,'leaderboard')));
}
function renderTotw() {
    totwPlayers.sort((a,b)=>b.ovr-a.ovr);
    const c=document.getElementById('totw-grid'); c.innerHTML='';
    if(!totwPlayers.length){c.innerHTML='<div class="empty-msg">No TOTW players yet — admins can add them above.</div>';return;}
    totwPlayers.forEach((p,i)=>c.appendChild(buildCard(p,i,'totw')));
}
function renderAllstars() {
    allstarPlayers.sort((a,b)=>b.ovr-a.ovr);
    const c=document.getElementById('allstars-grid'); c.innerHTML='';
    if(!allstarPlayers.length){c.innerHTML='<div class="empty-msg">No All Stars yet — admins can add them above.</div>';return;}
    allstarPlayers.forEach((p,i)=>c.appendChild(buildCard(p,i,'allstar')));
}

async function fetchPlayers() {
    try { const {data,error}=await sb.from('players_records').select('*').order('ovr',{ascending:false}); if(error)throw error; players=(data||[]).map(d=>({...d,id:String(d.id)})); } catch(e){ players=(JSON.parse(localStorage.getItem('players'))||[]).map(d=>({...d,id:String(d.id)})); }
    renderLeaderboard();
}
async function fetchTotw() {
    try { const {data,error}=await sb.from('totw_players').select('*').order('ovr',{ascending:false}); if(error)throw error; totwPlayers=(data||[]).map(d=>({...d,id:String(d.id)})); } catch(e){ totwPlayers=(JSON.parse(localStorage.getItem('totw'))||[]).map(d=>({...d,id:String(d.id)})); }
    renderTotw();
}
async function fetchAllstars() {
    try { const {data,error}=await sb.from('allstars_players').select('*').order('ovr',{ascending:false}); if(error)throw error; allstarPlayers=(data||[]).map(d=>({...d,id:String(d.id)})); } catch(e){ allstarPlayers=(JSON.parse(localStorage.getItem('allstars'))||[]).map(d=>({...d,id:String(d.id)})); }
    renderAllstars();
}

// ── Player CRUD ───────────────────────────────────────────────────────────────
const playerModal = document.getElementById('playerModal');
function openPlayerModal(id=null) {
    resetForm(['p-id','p-name','p-img','p-pos','p-pac','p-sho','p-pas','p-dri','p-def','p-phy'],'p-wf');
    document.getElementById('playerModalTitle').textContent='Add Player';
    document.getElementById('playerSaveBtn').textContent='Add to League';
    if(id){
        const p=players.find(x=>x.id===String(id)); if(!p)return;
        document.getElementById('playerModalTitle').textContent=`Edit ${p.name}`;
        document.getElementById('p-id').value=p.id;
        document.getElementById('p-name').value=p.name;
        document.getElementById('p-img').value=p.img?.includes('flaticon')?'':p.img||'';
        document.getElementById('p-pos').value=p.pos;
        document.getElementById('p-wf').value=p.wf;
        ['pac','sho','pas','dri','def','phy'].forEach(s=>document.getElementById(`p-${s}`).value=p[s]);
        document.getElementById('playerSaveBtn').textContent='Update Player';
    }
    playerModal.style.display='block';
}
function closePlayerModal(){playerModal.style.display='none';}
async function savePlayer(){
    if(!isLoggedIn()){alert('Admin login required.');return;}
    const id=document.getElementById('p-id').value;
    const stats=['pac','sho','pas','dri','def','phy'].map(s=>parseInt(document.getElementById(`p-${s}`).value)||0);
    const d={id:id||String(Date.now()),name:document.getElementById('p-name').value||'Player',img:document.getElementById('p-img').value||'https://cdn-icons-png.flaticon.com/512/1163/1163481.png',pos:(document.getElementById('p-pos').value||'ST').toUpperCase(),wf:document.getElementById('p-wf').value,pac:stats[0],sho:stats[1],pas:stats[2],dri:stats[3],def:stats[4],phy:stats[5],ovr:Math.round(stats.reduce((a,b)=>a+b)/6)};
    if(sb){try{const{error}=await sb.from('players_records').upsert(d);if(error)throw error;}catch(e){alert('Save failed.');console.error(e);}}
    else{if(id)players[players.findIndex(p=>p.id===String(id))]=d;else players.push(d);localStorage.setItem('players',JSON.stringify(players));renderLeaderboard();}
    closePlayerModal();
}
async function deletePlayer(id){
    if(!isLoggedIn()){alert('Admin login required.');return;}
    if(sb){try{const{error}=await sb.from('players_records').delete().eq('id',id);if(error)throw error;}catch(e){alert('Delete failed.');}}
    else{players=players.filter(p=>p.id!==String(id));localStorage.setItem('players',JSON.stringify(players));renderLeaderboard();}
}

function resetForm(ids, wfId) {
    ids.forEach(id=>document.getElementById(id).value='');
    document.getElementById(wfId).value='⭐⭐⭐⭐';
}

function subscribeRealtime(){
    if(!sb)return;
    try{
        sb.channel('pl').on('postgres_changes',{event:'*',schema:'public',table:'players_records'},fetchPlayers).subscribe();
        sb.channel('tw').on('postgres_changes',{event:'*',schema:'public',table:'totw_players'},fetchTotw).subscribe();
        sb.channel('as').on('postgres_changes',{event:'*',schema:'public',table:'allstars_players'},fetchAllstars).subscribe();
    }catch(e){console.error(e);}
}

(async()=>{
    if(sb){ await Promise.all([fetchPlayers(),fetchTotw(),fetchAllstars()]); subscribeRealtime(); }
    else { players=(JSON.parse(localStorage.getItem('players'))||[]).map(d=>({...d,id:String(d.id)})); totwPlayers=(JSON.parse(localStorage.getItem('totw'))||[]).map(d=>({...d,id:String(d.id)})); allstarPlayers=(JSON.parse(localStorage.getItem('allstars'))||[]).map(d=>({...d,id:String(d.id)})); renderAll(); }
    updateAdminUI();
})();

window.onclick=e=>{
    if(e.target===playerModal)closePlayerModal();
    if(e.target===totwModal2)closeTotwModal();
    if(e.target===allstarsModal2)closeAllstarsModal();
    if(e.target===loginModal)closeLoginModal();
