<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylesbury League</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(180deg, #00BFFF 0%, #87CEEB 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.25); font-size: 3.5rem; margin-bottom: 20px; }

        .admin-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 10px; }
        .admin-status { color: white; font-size: 0.95rem; opacity: 0.9; }
        .admin-btn { background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.6); padding: 7px 20px; border-radius: 25px; font-size: 0.95rem; font-weight: bold; cursor: pointer; font-family: 'Oswald', sans-serif; transition: 0.2s; }
        .admin-btn:hover { background: rgba(255,255,255,0.35); }
        .admin-btn.logout { border-color: #ff6b6b; color: #ff6b6b; }

        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
        .section-title { color: white; font-size: 2rem; font-weight: 700; text-shadow: 1px 1px 6px rgba(0,0,0,0.2); }

        .add-btn-wrap { background: rgba(255,255,255,0.95); padding: 8px 18px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .section-btn { border: none; padding: 9px 28px; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
        .section-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .section-btn.green { background: #2ecc71; color: white; }
        .section-btn.totw { background: linear-gradient(135deg, #1a1200, #2e2000); color: #f0d060; border: 1px solid #c9a84c; }
        .section-btn.allstars { background: linear-gradient(135deg, #c2006a, #6800bb, #0088c0); color: white; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 28px; }

        .card-wrap { position: relative; cursor: pointer; transition: transform 0.25s, filter 0.25s; }
        .card-wrap:hover { transform: translateY(-10px) scale(1.03); filter: brightness(1.07); }
        .card-wrap svg { width: 100%; height: auto; display: block; }

        .del-btn {
            position: absolute; top: 12px; left: 12px;
            width: 24px; height: 24px; border-radius: 50%;
            background: #ff3333; color: white; border: none;
            font-size: 12px; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; font-family: sans-serif; line-height: 1;
        }
        .del-btn:disabled { background: #888; cursor: not-allowed; opacity: 0.55; }

        .section-gap { margin-top: 55px; margin-bottom: 22px; }
        .divider-gold { width: 100%; height: 2px; border: none; background: linear-gradient(90deg, transparent, #c9a84c 30%, #c9a84c 70%, transparent); margin-bottom: 22px; }
        .divider-rainbow { width: 100%; height: 2px; border: none; background: linear-gradient(90deg, transparent, #ff60b0 15%, #a040ee 35%, #40d0ff 65%, #e8c040 85%, transparent); margin-bottom: 22px; }

        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 4% auto; padding: 28px; width: 90%; max-width: 480px; border-radius: 18px; position: relative; }
        .modal-title { font-size: 1.7rem; font-weight: bold; text-align: center; color: #222; margin-bottom: 18px; }
        .close-x { position: absolute; right: 18px; top: 12px; font-size: 1.9rem; cursor: pointer; color: #aaa; line-height: 1; }
        .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
        .fg .fw { grid-column: span 2; }
        .fg input, .fg select { padding: 11px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; font-family: 'Oswald', sans-serif; width: 100%; }
        .fg .sbtn { grid-column: span 2; padding: 14px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif; margin-top: 6px; color: white; }
        .fg .sbtn.blue { background: #00BFFF; }
        .fg .sbtn.totw-s { background: linear-gradient(135deg,#1a1200,#2e2000); color: #f0d060; border: 1px solid #c9a84c; }
        .fg .sbtn.as-s { background: linear-gradient(135deg,#c2006a,#6800bb,#0088c0); }
        
        #loginError { color: #e74c3c; font-size: 0.88rem; text-align: center; min-height: 18px; }
        .empty-msg { grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.7); font-size: 1rem; padding: 28px; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚽ AYLESBURY LEAGUE</h1>
    <div class="admin-bar">
        <span class="admin-status" id="adminStatus">🔒 Not logged in</span>
        <button class="admin-btn" id="adminActionBtn" onclick="handleAdminBtn()">Admin Login</button>
    </div>

    <div class="section-header">
        <h2 class="section-title">🏆 Leaderboard</h2>
        <div class="add-btn-wrap">
            <button class="section-btn green" id="addPlayerBtn" disabled onclick="openPlayerModal()">+ Add Player</button>
        </div>
    </div>
    <div class="card-grid" id="leaderboard"></div>

    <div class="section-gap">
        <hr class="divider-gold">
        <div class="section-header">
            <h2 class="section-title">👑 Team of the Week</h2>
            <div class="add-btn-wrap" style="background: rgba(0,0,0,0.35); border: 2px solid #c9a84c;">
                <button class="section-btn totw" id="addTotwBtn" disabled onclick="openTotwModal()">+ Add TOTW</button>
            </div>
        </div>
        <div class="card-grid" id="totw-grid"></div>
    </div>

    <div class="section-gap">
        <hr class="divider-rainbow">
        <div class="section-header">
            <h2 class="section-title">🌟 Tournament All Stars</h2>
            <div class="add-btn-wrap" style="background: rgba(0,0,0,0.3); border: 2px solid rgba(255,100,180,0.7);">
                <button class="section-btn allstars" id="addAllstarsBtn" disabled onclick="openAllstarsModal()">+ Add All Star</button>
            </div>
        </div>
        <div class="card-grid" id="allstars-grid"></div>
    </div>
</div>

<div class="modal" id="playerModal">
    <div class="modal-box">
        <span class="close-x" onclick="closePlayerModal()">&times;</span>
        <div class="modal-title">Add Player</div>
        <div class="fg">
            <input type="hidden" id="p-id">
            <input class="fw" type="text" id="p-name" placeholder="Full Name">
            <input class="fw" type="text" id="p-img" placeholder="Photo URL">
            <input type="text" id="p-pos" placeholder="POS">
            <select id="p-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <input type="number" id="p-pac" placeholder="PAC"><input type="number" id="p-sho" placeholder="SHO"><input type="number" id="p-pas" placeholder="PAS"><input type="number" id="p-dri" placeholder="DRI"><input type="number" id="p-def" placeholder="DEF"><input type="number" id="p-phy" placeholder="PHY">
            <button class="sbtn blue" onclick="savePlayer()">Save</button>
        </div>
    </div>
</div>

<div class="modal" id="totwModal">
    <div class="modal-box" style="border-top: 4px solid #c9a84c;">
        <span class="close-x" onclick="closeTotwModal()">&times;</span>
        <div class="modal-title">👑 Add TOTW Player</div>
        <div class="fg">
            <input type="hidden" id="t-id">
            <input class="fw" type="text" id="t-name" placeholder="Full Name">
            <input class="fw" type="text" id="t-img" placeholder="Photo URL">
            <input type="text" id="t-pos" placeholder="POS">
            <select id="t-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <input type="number" id="t-pac" placeholder="PAC"><input type="number" id="t-sho" placeholder="SHO"><input type="number" id="t-pas" placeholder="PAS"><input type="number" id="t-dri" placeholder="DRI"><input type="number" id="t-def" placeholder="DEF"><input type="number" id="t-phy" placeholder="PHY">
            <button class="sbtn totw-s" onclick="saveTotwPlayer()">Save</button>
        </div>
    </div>
</div>

<div class="modal" id="allstarsModal">
    <div class="modal-box" style="border-top: 4px solid #e040c0;">
        <span class="close-x" onclick="closeAllstarsModal()">&times;</span>
        <div class="modal-title">🌟 Add All Star</div>
        <div class="fg">
            <input type="hidden" id="a-id">
            <input class="fw" type="text" id="a-name" placeholder="Full Name">
            <input class="fw" type="text" id="a-img" placeholder="Photo URL">
            <input type="text" id="a-pos" placeholder="POS">
            <select id="a-wf"><option value="⭐">1★ WF</option><option value="⭐⭐">2★ WF</option><option value="⭐⭐⭐">3★ WF</option><option value="⭐⭐⭐⭐" selected>4★ WF</option><option value="⭐⭐⭐⭐⭐">5★ WF</option></select>
            <input type="number" id="a-pac" placeholder="PAC"><input type="number" id="a-sho" placeholder="SHO"><input type="number" id="a-pas" placeholder="PAS"><input type="number" id="a-dri" placeholder="DRI"><input type="number" id="a-def" placeholder="DEF"><input type="number" id="a-phy" placeholder="PHY">
            <button class="sbtn as-s" onclick="saveAllstar()">Save</button>
        </div>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-box" style="max-width:360px;">
        <span class="close-x" onclick="closeLoginModal()">&times;</span>
        <div class="modal-title">🔐 Admin Login</div>
        <div class="login-form" style="display: flex; flex-direction: column; gap: 13px;">
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <div id="loginError"></div>
            <button class="sbtn blue" onclick="submitLogin()">Login</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://bmwiqpkgdbeohkwbqaft.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kguMGdM9yIP_qoUdOU6x_w_4ObYO4Wt';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PALETTES = {
    gold:   { g1:'#fff5b0', g2:'#f0c030', g3:'#b8860b', ray:'rgba(255,255,255,0.12)', text:'#2a1800', subtext:'#5a3a00', border:'#d4a017' },
    silver: { g1:'#f8f8f8', g2:'#c0c0c0', g3:'#707070', ray:'rgba(255,255,255,0.11)', text:'#111', subtext:'#444', border:'#aaa' },
    bronze: { g1:'#f0b888', g2:'#c06838', g3:'#602810', ray:'rgba(255,255,255,0.08)', text:'#fff', subtext:'rgba(255,255,255,0.85)', border:'#a0521a' },
    totw:   { g1:'#2a1e00', g2:'#090909', g3:'#140e00', ray:'rgba(201,168,76,0.08)', text:'#f0d060', subtext:'#c9a84c', border:'#c9a84c' },
    rainbow: { stops: ['#c2006a', '#6800bb', '#0088c0'], ray:'rgba(255,255,255,0.15)', text:'#fff', subtext:'rgba(255,255,255,0.9)', border:'#fff' }
};

function buildCard(p, rank, type) {
    let pk;
    if(type==='leaderboard') pk = p.ovr>=80?'gold':p.ovr>=70?'silver':'bronze';
    else if(type==='totw') pk = 'totw';
    else pk = 'rainbow';
    
    const pal = PALETTES[pk];
    const W=280, H=390;
    const gradId = `g${p.id}${type}`;
    const rayId = `r${p.id}${type}`;

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    
    let gradientHtml = '';
    if(pal.stops) {
        gradientHtml = `<linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${pal.stops[0]}"/><stop offset="50%" stop-color="${pal.stops[1]}"/><stop offset="100%" stop-color="${pal.stops[2]}"/>
        </linearGradient>`;
    } else {
        gradientHtml = `<linearGradient id="${gradId}" x1="0%" y1="0%" x2="60%" y2="100%">
            <stop offset="0%" stop-color="${pal.g1}"/><stop offset="50%" stop-color="${pal.g2}"/><stop offset="100%" stop-color="${pal.g3}"/>
        </linearGradient>`;
    }

    svg.innerHTML = `
        <defs>
            ${gradientHtml}
            <pattern id="${rayId}" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(-40)">
                <line x1="0" y1="0" x2="0" y2="12" stroke="${pal.ray}" stroke-width="5"/>
            </pattern>
            <clipPath id="cp${p.id}${type}"><circle cx="140" cy="165" r="68"/></clipPath>
        </defs>
        <path d="M 60,0 L 220,0 A 22,22 0 0,1 242,22 L 280,22 A 18,18 0 0,1 280,40 L 280,340 Q 280,390 140,390 Q 0,390 0,340 L 0,40 A 18,18 0 0,1 0,22 L 38,22 A 22,22 0 0,1 60,0 Z" fill="url(#${gradId})"/>
        <path d="M 60,0 L 220,0 A 22,22 0 0,1 242,22 L 280,22 A 18,18 0 0,1 280,40 L 280,340 Q 280,390 140,390 Q 0,390 0,340 L 0,40 A 18,18 0 0,1 0,22 L 38,22 A 22,22 0 0,1 60,0 Z" fill="url(#${rayId})"/>
        
        <text x="32" y="62" font-family="Oswald" font-size="36" font-weight="900" fill="${pal.text}">${p.ovr}</text>
        <text x="32" y="78" font-family="Oswald" font-size="13" font-weight="700" fill="${pal.subtext}">${p.pos}</text>
        <text x="32" y="94" font-family="Oswald" font-size="12" font-weight="600" fill="${pal.subtext}">${p.wf}</text>

        <circle cx="140" cy="165" r="70" fill="none" stroke="${pal.border}" stroke-width="2.5" opacity="0.6"/>
        <image href="${p.img}" x="72" y="97" width="136" height="136" clip-path="url(#cp${p.id}${type})" preserveAspectRatio="xMidYMid slice" onerror="this.setAttribute('href','https://cdn-icons-png.flaticon.com/512/1163/1163481.png')"/>

        <line x1="30" y1="248" x2="250" y2="248" stroke="${pal.subtext}" stroke-width="1.2" opacity="0.4"/>
        <text x="140" y="275" font-family="Oswald" font-size="22" font-weight="700" text-anchor="middle" fill="${pal.text}">${p.name.toUpperCase()}</text>

        <g transform="translate(140, 315)" font-family="Oswald" text-anchor="middle">
            <g transform="translate(-85,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">PAC</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.pac}</text></g>
            <g transform="translate(-51,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">SHO</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.sho}</text></g>
            <g transform="translate(-17,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">PAS</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.pas}</text></g>
            <g transform="translate(17,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">DRI</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.dri}</text></g>
            <g transform="translate(51,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">DEF</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.def}</text></g>
            <g transform="translate(85,0)"><text font-size="12" font-weight="700" fill="${pal.subtext}">PHY</text><text y="25" font-size="22" font-weight="900" fill="${pal.text}">${p.phy}</text></g>
        </g>
    `;

    const wrap = document.createElement('div');
    wrap.className='card-wrap';
    const del = document.createElement('button');
    del.className='del-btn'; del.textContent='✕'; del.disabled=!user;
    del.onclick=e=>{ e.stopPropagation(); if(confirm('Delete?')) deleteItem(p.id, type); };
    
    wrap.appendChild(del); wrap.appendChild(svg);
    wrap.onclick=()=>{ if(user) openEdit(p, type); };
    return wrap;
}

let players=[], totw=[], allstars=[], user=null;

function updateAdminUI() {
    document.getElementById('adminStatus').textContent = user ? `✅ ${user.username}` : '🔒 Not logged in';
    document.getElementById('adminActionBtn').textContent = user ? 'Logout' : 'Admin Login';
    ['addPlayerBtn','addTotwBtn','addAllstarsBtn'].forEach(id=>document.getElementById(id).disabled=!user);
    renderAll();
}

function handleAdminBtn() { if(user){user=null; updateAdminUI();} else openLoginModal(); }
function openLoginModal() { document.getElementById('loginModal').style.display='block'; }
function closeLoginModal() { document.getElementById('loginModal').style.display='none'; }

async function submitLogin() {
    const u=document.getElementById('loginUser').value, p=document.getElementById('loginPass').value;
    const {data} = await sb.from('admins').select('*').eq('username',u).eq('password',p).maybeSingle();
    if(data){ user=data; closeLoginModal(); updateAdminUI(); } else document.getElementById('loginError').textContent='Fail';
}

function renderAll() {
    renderGrid('leaderboard', players, 'leaderboard');
    renderGrid('totw-grid', totw, 'totw');
    renderGrid('allstars-grid', allstars, 'allstar');
}
function renderGrid(id, list, type) {
    const c=document.getElementById(id); c.innerHTML='';
    list.sort((a,b)=>b.ovr-a.ovr).forEach((p,i)=>c.appendChild(buildCard(p,i,type)));
}

async function refresh() {
    const p = await sb.from('players_records').select('*'); players=p.data||[];
    const t = await sb.from('totw_players').select('*'); totw=t.data||[];
    const a = await sb.from('allstars_players').select('*'); allstars=a.data||[];
    renderAll();
}

function openPlayerModal() { reset('p'); document.getElementById('playerModal').style.display='block'; }
function closePlayerModal() { document.getElementById('playerModal').style.display='none'; }
function openTotwModal() { reset('t'); document.getElementById('totwModal').style.display='block'; }
function closeTotwModal() { document.getElementById('totwModal').style.display='none'; }
function openAllstarsModal() { reset('a'); document.getElementById('allstarsModal').style.display='block'; }
function closeAllstarsModal() { document.getElementById('allstarsModal').style.display='none'; }

function reset(pre) { ['id','name','img','pos','pac','sho','pas','dri','def','phy'].forEach(f=>document.getElementById(`${pre}-${f}`).value=''); }
function fill(pre, p) { ['id','name','img','pos','pac','sho','pas','dri','def','phy'].forEach(f=>document.getElementById(`${pre}-${f}`).value=p[f]); document.getElementById(`${pre}-wf`).value=p.wf; }

function openEdit(p, type) {
    if(type==='leaderboard') { fill('p',p); document.getElementById('playerModal').style.display='block'; }
    else if(type==='totw') { fill('t',p); document.getElementById('totwModal').style.display='block'; }
    else { fill('a',p); document.getElementById('allstarsModal').style.display='block'; }
}

async function savePlayer() { await sb.from('players_records').upsert(get('p')); closePlayerModal(); refresh(); }
async function saveTotwPlayer() { await sb.from('totw_players').upsert(get('t')); closeTotwModal(); refresh(); }
async function saveAllstar() { await sb.from('allstars_players').upsert(get('a')); closeAllstarsModal(); refresh(); }

function get(pre) {
    const s = ['pac','sho','pas','dri','def','phy'].map(f=>parseInt(document.getElementById(`${pre}-${f}`).value)||0);
    return {
        id: document.getElementById(`${pre}-id`).value || undefined,
        name: document.getElementById(`${pre}-name`).value,
        img: document.getElementById(`${pre}-img`).value,
        pos: document.getElementById(`${pre}-pos`).value.toUpperCase(),
        wf: document.getElementById(`${pre}-wf`).value,
        pac:s[0], sho:s[1], pas:s[2], dri:s[3], def:s[4], phy:s[5],
        ovr: Math.round(s.reduce((a,b)=>a+b)/6)
    };
}

async function deleteItem(id, type) {
    const table = type==='leaderboard'?'players_records':type==='totw'?'totw_players':'allstars_players';
    await sb.from(table).delete().eq('id',id);
    refresh();
}

function subscribeRealtime(){
    sb.channel('pl').on('postgres_changes',{event:'*',schema:'public',table:'players_records'},refresh).subscribe();
    sb.channel('tw').on('postgres_changes',{event:'*',schema:'public',table:'totw_players'},refresh).subscribe();
    sb.channel('as').on('postgres_changes',{event:'*',schema:'public',table:'allstars_players'},refresh).subscribe();
}

window.onclick=e=>{ if(e.target.className==='modal') e.target.style.display='none'; };
refresh();
subscribeRealtime();
</script>
</body>
</html>
