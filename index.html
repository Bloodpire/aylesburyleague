<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neighborhood Summer League</title>
    <style>
        :root {
            --sky-blue: #00BFFF;
            --gold-card: linear-gradient(160deg, #ffe359 0%, #cf9a2a 100%);
            --silver-card: linear-gradient(160deg, #e0e0e0 0%, #8e8e8e 100%);
            --bronze-card: linear-gradient(160deg, #d3915f 0%, #6e3a15 100%);
        }

        body {
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(180deg, #00BFFF 0%, #87CEEB 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #222;
        }

        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); font-size: 3rem; margin-bottom: 10px; }

        /* Admin Panel */
        .admin-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .admin-panel input, .admin-panel select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: 'Oswald', sans-serif;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .add-btn { background: #2ecc71; color: white; }
        .update-btn { background: #3498db; color: white; display: none; }

        /* Card Grid */
        #leaderboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            padding-bottom: 50px;
        }

        /* FIFA Card */
        .card {
            position: relative;
            aspect-ratio: 2 / 3;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            clip-path: polygon(0% 0%, 100% 0%, 100% 88%, 50% 100%, 0% 88%);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card:hover { transform: translateY(-10px); }
        .card.gold { background: var(--gold-card); }
        .card.silver { background: var(--silver-card); }
        .card.bronze { background: var(--bronze-card); color: white; }

        .player-img {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.5);
        }

        .ovr-main { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        .player-name { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.1); margin-bottom: 10px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            position: absolute;
            bottom: 45px;
            width: 100%;
            left: 0;
        }

        .action-btn {
            background: rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.2);
            padding: 4px 8px;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <h1>☀️ NEIGHBORHOOD SUMMER LEAGUE</h1>

    <div class="admin-panel" id="input-form">
        <input type="hidden" id="edit-id">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="img-url" placeholder="Photo Link (URL)">
        <input type="text" id="pos" placeholder="POS" style="width: 50px;">
        <select id="wf">
            <option value="⭐">1★</option>
            <option value="⭐⭐">2★</option>
            <option value="⭐⭐⭐">3★</option>
            <option value="⭐⭐⭐⭐" selected>4★</option>
            <option value="⭐⭐⭐⭐⭐">5★</option>
        </select>
        <input type="number" id="pac" placeholder="PAC" style="width: 50px;">
        <input type="number" id="sho" placeholder="SHO" style="width: 50px;">
        <input type="number" id="pas" placeholder="PAS" style="width: 50px;">
        <input type="number" id="dri" placeholder="DRI" style="width: 50px;">
        <input type="number" id="def" placeholder="DEF" style="width: 50px;">
        <input type="number" id="phy" placeholder="PHY" style="width: 50px;">
        
        <button class="btn add-btn" id="add-btn" onclick="savePlayer()">Add Player</button>
        <button class="btn update-btn" id="update-btn" onclick="savePlayer()">Update Player</button>
    </div>

    <div id="leaderboard"></div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('neighborhoodPlayers')) || [];

    function savePlayer() {
        const id = document.getElementById('edit-id').value;
        const stats = [
            parseInt(document.getElementById('pac').value) || 0,
            parseInt(document.getElementById('sho').value) || 0,
            parseInt(document.getElementById('pas').value) || 0,
            parseInt(document.getElementById('dri').value) || 0,
            parseInt(document.getElementById('def').value) || 0,
            parseInt(document.getElementById('phy').value) || 0
        ];
        const ovr = Math.round(stats.reduce((a, b) => a + b) / 6);
        
        const playerData = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('name').value || "Player",
            img: document.getElementById('img-url').value || "https://cdn-icons-png.flaticon.com/512/1163/1163481.png",
            pos: (document.getElementById('pos').value || "ST").toUpperCase(),
            wf: document.getElementById('wf').value,
            pac: stats[0], sho: stats[1], pas: stats[2],
            dri: stats[3], def: stats[4], phy: stats[5],
            ovr: ovr
        };

        if (id) {
            // Update existing
            const index = players.findIndex(p => p.id === parseInt(id));
            players[index] = playerData;
        } else {
            // Add new
            players.push(playerData);
        }

        updateDisplay();
        resetForm();
    }

    function editPlayer(id) {
        const p = players.find(player => player.id === id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('img-url').value = p.img.includes('flaticon') ? '' : p.img;
        document.getElementById('pos').value = p.pos;
        document.getElementById('wf').value = p.wf;
        document.getElementById('pac').value = p.pac;
        document.getElementById('sho').value = p.sho;
        document.getElementById('pas').value = p.pas;
        document.getElementById('dri').value = p.dri;
        document.getElementById('def').value = p.def;
        document.getElementById('phy').value = p.phy;

        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('update-btn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function removePlayer(id) {
        if(confirm("Remove this player?")) {
            players = players.filter(p => p.id !== id);
            updateDisplay();
        }
    }

    function updateDisplay() {
        players.sort((a, b) => b.ovr - a.ovr);
        localStorage.setItem('neighborhoodPlayers', JSON.stringify(players));
        const container = document.getElementById('leaderboard');
        container.innerHTML = '';

        players.forEach((p, index) => {
            let tier = p.ovr >= 80 ? 'gold' : (p.ovr >= 70 ? 'silver' : 'bronze');
            container.innerHTML += `
                <div class="card ${tier}">
                    <div style="font-weight:bold">#${index + 1}</div>
                    <img src="${p.img}" class="player-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1163/1163481.png'">
                    <div class="ovr-main">${p.ovr}</div>
                    <div class="player-name">${p.name}</div>
                    <div style="font-weight:bold">${p.pos} | ${p.wf}</div>
                    <div class="stats-grid">
                        <span>PAC ${p.pac}</span> <span>SHO ${p.sho}</span>
                        <span>PAS ${p.pas}</span> <span>DRI ${p.dri}</span>
                        <span>DEF ${p.def}</span> <span>PHY ${p.phy}</span>
                    </div>
                    <div class="actions">
                        <button class="action-btn" onclick="editPlayer(${p.id})">Edit</button>
                        <button class="action-btn" onclick="removePlayer(${p.id})">Del</button>
                    </div>
                </div>
            `;
        });
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#input-form input').forEach(i => i.value = '');
        document.getElementById('add-btn').style.display = 'block';
        document.getElementById('update-btn').style.display = 'none';
    }

    updateDisplay();
</script>
</body>
</html>
