<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylesbury League</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #00BFFF;
            --gold-card: linear-gradient(160deg, #ffe359 0%, #cf9a2a 100%);
            --silver-card: linear-gradient(160deg, #e0e0e0 0%, #8e8e8e 100%);
            --bronze-card: linear-gradient(160deg, #d3915f 0%, #6e3a15 100%);
            --off-white-overlay: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Oswald', sans-serif;
            background: linear-gradient(180deg, #00BFFF 0%, #87CEEB 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); font-size: 3.5rem; margin-bottom: 20px; }

        /* Admin bar */
        .admin-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .admin-status {
            color: white;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .admin-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.6);
            padding: 7px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            transition: 0.2s;
        }
        .admin-btn:hover { background: rgba(255,255,255,0.35); }
        .admin-btn.logout { border-color: #ff6b6b; color: #ff6b6b; }
        .admin-btn.logout:hover { background: rgba(255,107,107,0.15); }

        /* Add Player Bar */
        .add-player-section {
            background: var(--off-white-overlay);
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .open-modal-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
        }
        .open-modal-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Card Grid */
        #leaderboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* FIFA Card */
        .card {
            position: relative;
            width: 100%;
            padding: 12px 15px 0 15px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card::after {
            content: '';
            display: block;
            width: 100%;
            height: 40px;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            margin-top: 10px;
            flex-shrink: 0;
        }

        .card.gold::after { background: #cf9a2a; }
        .card.silver::after { background: #8e8e8e; }
        .card.bronze::after { background: #6e3a15; }

        .card:hover { transform: translateY(-10px) scale(1.02); }
        .card.gold { background: var(--gold-card); color: #222; }
        .card.silver { background: var(--silver-card); color: #222; }
        .card.bronze { background: var(--bronze-card); color: white; }

        .delete-x {
            position: absolute;
            top: 10px;
            left: 15px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .delete-x:disabled {
            background: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .lock-icon {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 14px;
            opacity: 0.5;
        }

        .player-img {
            width: 90px;
            height: 90px;
            margin: 3px auto;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.5);
        }

        .ovr-main { font-size: 2.8rem; font-weight: 900; line-height: 1; margin: 0; }
        .player-name { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.1); margin: 3px 0; padding-bottom: 2px; width: 100%;}

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 4px;
            gap: 0;
            width: 100%;
        }
        .stat-item { padding: 1px 0; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            position: relative;
        }

        .modal-header { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; text-align: center; color: #333; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Oswald', sans-serif;
            box-sizing: border-box;
        }

        input { width: 100%; }

        .save-btn {
            grid-column: span 2;
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }

        /* ── Login Modal ── */
        #loginModal .modal-content {
            max-width: 380px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .login-form input {
            width: 100%;
            box-sizing: border-box;
        }

        .login-submit-btn {
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
        }

        #loginError {
            color: #e74c3c;
            font-size: 0.9rem;
            text-align: center;
            min-height: 20px;
        }

        .auth-badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.85rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ AYLESBURY LEAGUE</h1>

    <!-- Admin bar -->
    <div class="admin-bar">
        <span class="admin-status" id="adminStatus">🔒 Not logged in</span>
        <button class="admin-btn" id="adminActionBtn" onclick="handleAdminBtn()">Admin Login</button>
    </div>

    <div class="add-player-section">
        <button class="open-modal-btn" id="addPlayerBtn" onclick="requireAuth(() => openEditModal())">+ Add New Player</button>
    </div>

    <div id="leaderboard"></div>
</div>

<!-- Player Edit Modal -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-header" id="modalTitle">Add Player</div>
        
        <div class="form-grid">
            <input type="hidden" id="edit-id">
            <input type="text" id="name" placeholder="Full Name" class="full-width">
            <input type="text" id="img-url" placeholder="Photo URL (Optional)" class="full-width">
            <input type="text" id="pos" placeholder="POS (ST, CM, etc.)">
            <select id="wf">
                <option value="⭐">1★ WF</option>
                <option value="⭐⭐">2★ WF</option>
                <option value="⭐⭐⭐">3★ WF</option>
                <option value="⭐⭐⭐⭐" selected>4★ WF</option>
                <option value="⭐⭐⭐⭐⭐">5★ WF</option>
            </select>
            <input type="number" id="pac" placeholder="PAC" max="99">
            <input type="number" id="sho" placeholder="SHO" max="99">
            <input type="number" id="pas" placeholder="PAS" max="99">
            <input type="number" id="dri" placeholder="DRI" max="99">
            <input type="number" id="def" placeholder="DEF" max="99">
            <input type="number" id="phy" placeholder="PHY" max="99">
            
            <button class="save-btn" onclick="savePlayer()" id="saveBtnText">Save Player Data</button>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeLoginModal()">&times;</span>
        <div class="modal-header">🔐 Admin Login</div>
        <div class="login-form">
            <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') submitLogin()">
            <div id="loginError"></div>
            <button class="login-submit-btn" onclick="submitLogin()">Login</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    // ── Supabase config ──────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://bmwiqpkgdbeohkwbqaft.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_kguMGdM9yIP_qoUdOU6x_w_4ObYO4Wt';
    const supabaseClient = typeof window.supabase !== 'undefined'
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        : null;

    const LOCAL_KEY = 'neighborhoodPlayers';

    // ── Auth state (in-memory only, never persisted) ─────────────────────────
    let currentAdmin = null; // { id, username } when logged in

    function isLoggedIn() { return currentAdmin !== null; }

    function updateAdminUI() {
        const statusEl = document.getElementById('adminStatus');
        const btnEl    = document.getElementById('adminActionBtn');
        const addBtn   = document.getElementById('addPlayerBtn');

        if (isLoggedIn()) {
            statusEl.innerHTML = `✅ Logged in as <span class="auth-badge">${currentAdmin.username}</span>`;
            btnEl.textContent = 'Logout';
            btnEl.classList.add('logout');
            addBtn.disabled = false;
        } else {
            statusEl.textContent = '🔒 Not logged in';
            btnEl.textContent = 'Admin Login';
            btnEl.classList.remove('logout');
            addBtn.disabled = true;
        }
        // Re-render cards to update lock/delete states
        updateDisplay();
    }

    function handleAdminBtn() {
        if (isLoggedIn()) {
            logout();
        } else {
            openLoginModal();
        }
    }

    function logout() {
        currentAdmin = null;
        updateAdminUI();
    }

    // Guard: run callback only if admin is logged in, else prompt login
    function requireAuth(callback) {
        if (isLoggedIn()) {
            callback();
        } else {
            // After login, run the callback automatically
            pendingAuthCallback = callback;
            openLoginModal();
        }
    }

    let pendingAuthCallback = null;

    // ── Login Modal ──────────────────────────────────────────────────────────
    const loginModal = document.getElementById('loginModal');

    function openLoginModal() {
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
        loginModal.style.display = 'block';
        setTimeout(() => document.getElementById('loginUsername').focus(), 100);
    }

    function closeLoginModal() {
        loginModal.style.display = 'none';
        pendingAuthCallback = null;
    }

    async function submitLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl  = document.getElementById('loginError');

        if (!username || !password) {
            errorEl.textContent = 'Please enter username and password.';
            return;
        }

        errorEl.textContent = '⏳ Checking credentials…';

        try {
            // Query the admins table for matching credentials
            const { data, error } = await supabaseClient
                .from('admins')
                .select('id, username')
                .eq('username', username)
                .eq('password', password)
                .maybeSingle();

            if (error) throw error;

            if (data) {
                currentAdmin = { id: data.id, username: data.username };
                closeLoginModal();
                updateAdminUI();

                // Run deferred action if any (e.g. edit / delete that triggered login)
                if (pendingAuthCallback) {
                    const cb = pendingAuthCallback;
                    pendingAuthCallback = null;
                    cb();
                }
            } else {
                errorEl.textContent = '❌ Invalid username or password.';
            }
        } catch (err) {
            console.error('Login error:', err);
            errorEl.textContent = '⚠️ Login failed. Try again.';
        }
    }

    // ── Players ──────────────────────────────────────────────────────────────
    let players = [];
    const modal = document.getElementById('playerModal');

    (async function init() {
        if (supabaseClient) {
            await fetchPlayersFromSupabase();
            subscribeToPlayerChanges();
        } else {
            players = JSON.parse(localStorage.getItem(LOCAL_KEY)) || [];
            players = players.map(p => ({ ...p, id: String(p.id) }));
            updateDisplay();
        }
        updateAdminUI();
    })();

    async function fetchPlayersFromSupabase() {
        try {
            const { data, error } = await supabaseClient
                .from('players_records')
                .select('*')
                .order('ovr', { ascending: false });
            if (error) throw error;
            players = (data || []).map(d => ({ ...d, id: String(d.id) }));
            updateDisplay();
        } catch (err) {
            console.error('Error fetching players from Supabase:', err);
            players = JSON.parse(localStorage.getItem(LOCAL_KEY)) || [];
            players = players.map(p => ({ ...p, id: String(p.id) }));
            updateDisplay();
        }
    }

    function openEditModal(playerId = null) {
        resetForm();
        if (playerId !== null) {
            const p = players.find(x => x.id === String(playerId));
            if (!p) { console.warn('Player not found:', playerId); return; }
            document.getElementById('modalTitle').innerText = `Edit ${p.name}`;
            document.getElementById('edit-id').value = p.id;
            document.getElementById('name').value = p.name;
            document.getElementById('img-url').value = p.img && p.img.includes('flaticon') ? '' : p.img;
            document.getElementById('pos').value = p.pos;
            document.getElementById('wf').value = p.wf;
            document.getElementById('pac').value = p.pac;
            document.getElementById('sho').value = p.sho;
            document.getElementById('pas').value = p.pas;
            document.getElementById('dri').value = p.dri;
            document.getElementById('def').value = p.def;
            document.getElementById('phy').value = p.phy;
            document.getElementById('saveBtnText').innerText = "Update Player Info";
        }
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    async function savePlayer() {
        if (!isLoggedIn()) {
            alert('You must be logged in as an admin to save changes.');
            return;
        }

        const idInput = document.getElementById('edit-id').value;
        const stats = [
            parseInt(document.getElementById('pac').value) || 0,
            parseInt(document.getElementById('sho').value) || 0,
            parseInt(document.getElementById('pas').value) || 0,
            parseInt(document.getElementById('dri').value) || 0,
            parseInt(document.getElementById('def').value) || 0,
            parseInt(document.getElementById('phy').value) || 0
        ];
        const ovr = Math.round(stats.reduce((a, b) => a + b) / 6);

        const playerData = {
            id: idInput ? String(idInput) : String(Date.now()),
            name: document.getElementById('name').value || "Player",
            img: document.getElementById('img-url').value || "https://cdn-icons-png.flaticon.com/512/1163/1163481.png",
            pos: (document.getElementById('pos').value || "ST").toUpperCase(),
            wf: document.getElementById('wf').value,
            pac: stats[0], sho: stats[1], pas: stats[2],
            dri: stats[3], def: stats[4], phy: stats[5],
            ovr: ovr
        };

        if (supabaseClient) {
            try {
                const { error } = await supabaseClient.from('players_records').upsert(playerData);
                if (error) throw error;
            } catch (err) {
                console.error('Supabase upsert error:', err);
                alert('Failed to save to Supabase. See console.');
            }
        } else {
            if (idInput) {
                const index = players.findIndex(p => p.id === String(idInput));
                players[index] = playerData;
            } else {
                players.push(playerData);
            }
            localStorage.setItem(LOCAL_KEY, JSON.stringify(players));
            updateDisplay();
        }

        closeModal();
    }

    async function deletePlayer(playerId) {
        if (!isLoggedIn()) {
            alert('You must be logged in as an admin to delete players.');
            return;
        }

        if (supabaseClient) {
            try {
                const { error } = await supabaseClient.from('players_records').delete().eq('id', playerId);
                if (error) throw error;
            } catch (err) {
                console.error('Supabase delete error:', err);
                alert('Failed to delete on Supabase. See console.');
            }
        } else {
            players = players.filter(x => x.id !== String(playerId));
            localStorage.setItem(LOCAL_KEY, JSON.stringify(players));
            updateDisplay();
        }
    }

    function updateDisplay() {
        players.sort((a, b) => b.ovr - a.ovr);
        const container = document.getElementById('leaderboard');
        container.innerHTML = '';

        const loggedIn = isLoggedIn();

        players.forEach((p, index) => {
            let tier = p.ovr >= 80 ? 'gold' : (p.ovr >= 70 ? 'silver' : 'bronze');
            const card = document.createElement('div');
            card.className = `card ${tier}`;
            card.dataset.id = p.id;
            card.innerHTML = `
                <button class="delete-x" data-id="${p.id}" ${loggedIn ? '' : 'disabled title="Login as admin to delete"'}>X</button>
                ${loggedIn ? '' : '<span class="lock-icon">🔒</span>'}
                <div style="font-weight:bold; font-size: 0.8rem;">RANK #${index + 1}</div>
                <img src="${p.img}" class="player-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1163/1163481.png'">
                <div class="ovr-main">${p.ovr}</div>
                <div class="player-name">${p.name}</div>
                <div style="font-weight:bold; opacity: 0.9;">${p.pos} | ${p.wf}</div>
                <div class="stats-grid">
                    <div class="stat-item">PAC ${p.pac}</div><div class="stat-item">SHO ${p.sho}</div>
                    <div class="stat-item">PAS ${p.pas}</div><div class="stat-item">DRI ${p.dri}</div>
                    <div class="stat-item">DEF ${p.def}</div><div class="stat-item">PHY ${p.phy}</div>
                </div>
            `;

            // Edit on card click — requires auth
            card.addEventListener('click', function() {
                requireAuth(() => openEditModal(String(p.id)));
            });

            // Delete on X click — requires auth
            card.querySelector('.delete-x').addEventListener('click', function(e) {
                e.stopPropagation();
                if (!loggedIn) {
                    requireAuth(() => {
                        if (confirm("Permanently delete this player?")) {
                            deletePlayer(p.id);
                        }
                    });
                    return;
                }
                if (confirm("Permanently delete this player?")) {
                    deletePlayer(p.id);
                }
            });

            container.appendChild(card);
        });
    }

    function resetForm() {
        document.getElementById('edit-id').value = '';
        document.getElementById('name').value = '';
        document.getElementById('img-url').value = '';
        document.getElementById('pos').value = '';
        document.getElementById('pac').value = '';
        document.getElementById('sho').value = '';
        document.getElementById('pas').value = '';
        document.getElementById('dri').value = '';
        document.getElementById('def').value = '';
        document.getElementById('phy').value = '';
        document.getElementById('wf').value = '⭐⭐⭐⭐';
        document.getElementById('modalTitle').innerText = 'Add New Player';
        document.getElementById('saveBtnText').innerText = 'Add to League';
    }

    window.onclick = function(event) {
        if (event.target == modal) closeModal();
        if (event.target == loginModal) closeLoginModal();
    }

    function subscribeToPlayerChanges() {
        try {
            supabaseClient.channel('table-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'players_records' }, () => {
                    fetchPlayersFromSupabase();
                })
                .subscribe();
        } catch (err) {
            console.error('Realtime subscription failed:', err);
        }
    }
</script>
</body>
</html>
